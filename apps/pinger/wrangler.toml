name = "kraftplan-pinger"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Ping the Render backend every 10 minutes to prevent free-tier sleep
# (Render sleeps after ~15 min of inactivity).
[triggers]
crons = ["*/10 * * * *"]

[vars]
RENDER_API_URL = "https://kraftplan-api.onrender.com"