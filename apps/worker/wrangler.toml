# KraftPlan API — Cloudflare Worker (always-on, zero cold start).
# Deploy with an API token, no dashboard repo connection needed:
#   cd apps/worker
#   npx wrangler secret put DATABASE_URL      # paste the Neon POOLED URL
#   npx wrangler secret put JWT_SECRET
#   pnpm deploy                                # -> https://kraftplan-api.<subdomain>.workers.dev
name = "kraftplan-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Non-secret vars. DATABASE_URL and JWT_SECRET are set as secrets (see above).
[vars]
CORS_ORIGIN = "*"

# For `wrangler dev`, secrets are read from apps/worker/.dev.vars (gitignored).
