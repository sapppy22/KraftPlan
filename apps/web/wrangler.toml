# Cloudflare Pages config for the KraftPlan web app.
# Built with @cloudflare/next-on-pages (output: .vercel/output/static).
#
# Deploy from apps/web with an API token — no dashboard repo connection needed:
#   pnpm pages:build
#   npx wrangler pages deploy .vercel/output/static --project-name kraftplan
#
# The API runs on Cloudflare Workers (see apps/worker). After deploying the
# Worker, set NEXT_PUBLIC_API_BASE below (or as a Pages env var) to its URL,
# e.g. https://kraftplan-api.<your-subdomain>.workers.dev

name = "kraftplan"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# NEXT_PUBLIC_API_BASE is set as a Pages secret via `wrangler pages secret put`
# to avoid conflicts with the build-time env var binding.
