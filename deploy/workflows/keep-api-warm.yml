name: Keep API warm

# Render's free tier sleeps a service after ~15 min of inactivity, causing a
# cold start (~30-60s) on the next request. This scheduled ping keeps it awake.
# Set a repo variable API_HEALTH_URL = https://<your-api>.onrender.com/health
# (Settings → Secrets and variables → Actions → Variables). Delete this file if
# you move the API to Cloudflare Workers (always-on, no cold starts).

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.API_HEALTH_URL }}"
          if [ -z "$URL" ]; then echo "API_HEALTH_URL not set — skipping."; exit 0; fi
          echo "Pinging $URL"
          curl -fsS --max-time 60 "$URL" || echo "Ping failed (service may be cold-starting)."
