# Cloudflare Worker configuration for KraftPlan API
# Root wrangler.toml enables running `npx wrangler deploy` from workspace root
name = "kraftplan"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
CORS_ORIGIN = "*"
